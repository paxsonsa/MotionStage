name: Rust

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install Protoc
      uses: arduino/setup-protoc@v2
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Install Python Test Tooling
      run: python -m pip install --upgrade pip pytest maturin
    - name: Install Python SDK Package
      run: python -m pip install -e ./python
    - name: Run Python tests
      run: python -m pytest -q python/tests
    - name: Build Native Python Extension Wheel
      run: python -m maturin build --manifest-path crates/cinemotion-sdk-python/Cargo.toml --release -o target/wheels
    - name: Native Extension Import Smoke Test
      run: |
        python -m pip install --force-reinstall target/wheels/*.whl
        python - <<'PY'
        import cinemotion_sdk
        import cinemotion_sdk_rust
        print("cinemotion_sdk import ok")
        print("cinemotion_sdk_rust import ok")
        PY
