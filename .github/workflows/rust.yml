name: CI

'on':
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust Build/Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Check Formatting
        run: cargo fmt --all --check
      - name: Build Workspace
        run: cargo build --workspace --locked --verbose
      - name: Test Workspace
        run: cargo test --workspace --locked --verbose

  python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python Tooling
        run: python -m pip install --upgrade pip pytest
      - name: Install Python SDK Package
        run: python -m pip install -e ./python
      - name: Run Python tests
        run: python -m pytest -q python/tests

  native-extension:
    name: Native Extension Wheel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Build Tooling
        run: python -m pip install --upgrade pip maturin
      - name: Build Native Python Extension Wheel
        run: python -m maturin build --manifest-path crates/motionstage-sdk-python/Cargo.toml --features extension-module --release -o target/wheels
      - name: Native Extension Import Smoke Test
        run: |
          python -m pip install --force-reinstall target/wheels/*.whl
          python - <<'PY'
          import motionstage_sdk_rust
          print("motionstage_sdk_rust import ok")
          PY

  swift-ios-sdk:
    name: Swift iOS SDK XCFramework
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Test Swift SDK Rust crate
        run: cargo test -p motionstage-sdk-swift --locked --verbose
      - name: Build iOS XCFramework
        run: ./scripts/build-swift-ios.sh
      - name: Build Swift package for iOS simulator
        run: xcodebuild -scheme MotionStageClient -destination 'generic/platform=iOS Simulator' build
        working-directory: ./swift/MotionStageClient
