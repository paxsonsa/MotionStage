syntax = "proto3";
package cinemotion;

message ServerMessage {
  oneof body {
    Error error = 1;
    Ping ping = 2;
    Pong pong = 3;
    Initialize initialize = 10;
  }
}

message ClientMessage {
  oneof body { InitializeAck initializeAck = 11; }
}

message Error {}

message Ping {}

message Pong {}

message Initialize {
  int32 version = 1;
  int32 id = 2;
}

message InitializeAck {}
